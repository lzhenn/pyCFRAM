# climlab RCE +1% TOA solar — Fu radiation single-column smoke test
case_name: climlab_solar_fu
description: "1D climlab RCE +1% solar perturbation, Fu radiation (apple-to-apple with OLD CFRAM)"

input:
  base_pres:      input/base_pres.nc
