# climlab clear-sky RCE, 1×CO2 → 4×CO2 — pyCFRAM single-column validation.
#
# Input is generated by experiments/climlab_validation/run_rce_4xco2.py
# (climlab default 30-level sigma grid, pyCFRAM `cfram_*_1col` infers nlev
# at runtime from data_prep/plev.dat size — no Fortran rebuild needed).
#
# CO2 forcing: 348 → 1392 ppm (4×). Radiation engine: RRTMG (default).
# For the Fu engine variant, see cases/climlab_4xco2_fu/.
case_name: climlab_4xco2
description: "1D climlab clear-sky RCE, 1×CO2 → 4×CO2, RRTMG (cesm2_4xco2 forcing analogue)"

input:
  base_pres:      input/base_pres.nc
  base_surf:      input/base_surf.nc
  perturbed_pres: input/perturbed_pres.nc
  perturbed_surf: input/perturbed_surf.nc
  # No nonrad_forcing: clear-sky RCE has no LH/SH (energy goes through
  # convective adjustment, treated as Q_dyn implicit residual).

radiation:
  scheme: rrtmg              # default RRTMG engine (cfram_rrtmg_1col)
  output_terms: [co2, q, ts] # clear-sky RCE: CO2 + WV are perturbed; ts is
                             # the surface-T radiative response (key for
                             # closure: Σ_X dT_X = dT_obs requires dT_ts).
                             # cloud / aerosol / o3 / albedo / solar rows are
                             # always zero so they're filtered.
  drdt_eval: midstate        # 2nd-order CFRAM (Planck at (T_base+T_warm)/2).
                             # Resolved stratosphere residual (was 2-3 K, now <0.1 K).
                             # RRTMG-only.
  drdt_probe: centered       # EXPERIMENTAL #3: Planck probe ±0.5K instead of
                             # +1K, cancels R_TT in FD expansion. 2× rad_driver
                             # calls in calc_drdt. RRTMG-only.
  co2_handling: midstate     # EXPERIMENTAL: frc_co2 evaluated in midstate
                             # atmosphere instead of T_base, cancelling the
                             # ∂²R/∂T∂C cross-term. Targets the +0.3-0.6 K
                             # mid-trop (450-650 hPa) residual that midstate
                             # Planck alone doesn't resolve. +2 rad_driver
                             # calls per cell. RRTMG-only.
  # q_handling: midstate     # TESTED 2026-05-11 (Phase #2): frc_q in midstate
                             # atmosphere. Result: mid-trop residual UNCHANGED
                             # (0.237→0.242K RMS), upper-trop WORSE (3x).
                             # Conclusion: mid-trop residual is NOT q-T
                             # cross-term — baseline q path already correct.
  # q_handling: feedback     # Diagnostic (Manabe RH-fixed, one-sided warm
                             # path): improves surface (+0.17→0K) but NOT
                             # mid-trop. Mutually exclusive with midstate.

run:
  nproc: auto                # auto-caps to 1 for 1×1 grid
