# climlab RCE +1% TOA solar — single column (1×1) validation case
case_name: climlab_solar
description: "1D climlab RCE perturbation by +1% TOA solar (val. for pyCFRAM production code)"

# No source block: input NetCDF generated by experiments/climlab_validation/run_rce_solar.py

input:
  base_pres:      input/base_pres.nc
  base_surf:      input/base_surf.nc
  perturbed_pres: input/perturbed_pres.nc
  perturbed_surf: input/perturbed_surf.nc
  # No nonrad_forcing: RCE has no LH/SH (treated as Q_dyn implicitly)

run:
  nproc: 1            # 1×1 grid, no benefit from parallel
