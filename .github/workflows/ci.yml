name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Python syntax check (compile all .py)
        run: |
          python -m compileall -q core data scripts tests plotting run_case.py

      - name: Ruff lint (errors only, strict)
        run: |
          # Fail on real errors: syntax (E9), undefined names (F82),
          # bad imports (F63, F7).
          ruff check --select E9,F63,F7,F82 --output-format=github .

      - name: Ruff lint (style, advisory)
        run: |
          ruff check --output-format=github . || true
