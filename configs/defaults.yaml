# pyCFRAM global configuration
# Case-specific settings go in cases/<name>/case.yaml

# RRTMG radiation parameters
radiation:
  scon: 1360.98        # solar constant (W/m2)
  co2_ppmv: 395.0      # CO2 default (used if not in input data)
  ch4_ppmv: 1.6        # methane concentration
  n2o_ppmv: 0.28       # nitrous oxide concentration
  cloud_re_ice: 5.0    # ice particle effective radius (microns)
  cloud_re_liq: 20.0   # liquid particle effective radius (microns)
  icld: 2              # cloud scheme: 0=off, 2=McICA
  iaer: 10             # aerosol: 0=off, 10=band-by-band from input

# Pressure levels (hPa, TOA → surface)
grid:
  pressure_levels: [1, 2, 3, 5, 7, 10, 20, 30, 50, 70, 100, 125, 150,
                    175, 200, 225, 250, 300, 350, 400, 450, 500, 550,
                    600, 650, 700, 750, 775, 800, 825, 850, 875, 900,
                    925, 950, 975, 1000]

# Aerosol optical property lookup tables
# Each species maps to LW/SW GOCART tables and a radius/bin index
aerosol:
  species:
    bc:    {lw: opticsBands_BC.v1_3.RRTMG.nc, sw: opticsBands_BC.v1_5.RRTMG.nc, rd: 2}
    ocphi: {lw: opticsBands_OC.v1_3.RRTMG.nc, sw: opticsBands_OC.v1_5.RRTMG.nc, rd: 2}
    ocpho: {lw: opticsBands_OC.v1_3.RRTMG.nc, sw: opticsBands_OC.v1_5.RRTMG.nc, rd: 1}
    sulf:  {lw: opticsBands_SU.v1_3.RRTMG.nc, sw: opticsBands_SU.v1_5.RRTMG.nc, rd: 0.00000016}
    ss:    {lw: opticsBands_SS.v3_5.RRTMG.nc, sw: opticsBands_SS.v3_5.RRTMG.nc, rd: 3}
    dust:  {lw: opticsBands_DU.v15_3.RRTMG.nc, sw: opticsBands_DU.v15_5.RRTMG.nc, rd: 3}

# Parallel execution
run:
  nproc: auto          # "auto" = use all available CPUs

# Plotting defaults
plotting:
  levels_dt: [-15, -7, -2, -0.5, 0, 0.5, 2, 7, 15]
  cmap: RdBu_r
