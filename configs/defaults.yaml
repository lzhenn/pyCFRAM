# CFRAM-A default experiment configuration

radiation:
  nlev: 37
  icld: 2          # clouds enabled (McICA)
  iaer: 10         # aerosols from input (band-by-band)
  scon: 1360.98    # solar constant (W/m2)
  ch4_ppmv: 1.6
  n2o_ppmv: 0.28
  cloud_re_ice: 5.0    # microns
  cloud_re_liq: 20.0   # microns

domain:
  lon_min: 95.0
  lon_max: 125.0
  lat_min: 18.0
  lat_max: 42.0
  resolution: 0.25  # degrees

climatology:
  start_year: 2003
  end_year: 2022
  months: [8]       # August only for EH cases

events:
  EH13:
    year: 2013
    warm_period: [2013-08-05, 2013-08-17]
    key_area:
      lon: [110.0, 122.0]
      lat: [28.0, 36.0]
  EH22:
    year: 2022
    warm_period: [2022-08-03, 2022-08-24]
    key_area:
      lon: [103.0, 122.0]
      lat: [27.0, 35.0]

data_sources:
  era5:
    variables:
      pressure_level:
        - temperature
        - specific_humidity
        - ozone_mass_mixing_ratio
        - fraction_of_cloud_cover
        - specific_cloud_liquid_water_content
        - specific_cloud_ice_water_content
      single_level:
        - skin_temperature
        - surface_pressure
        - surface_solar_radiation_downwards
        - surface_net_solar_radiation
        - toa_incident_solar_radiation
        - forecast_albedo
    pressure_levels: [1,2,3,5,7,10,20,30,50,70,100,125,150,175,200,225,250,300,350,400,450,500,550,600,650,700,750,775,800,825,850,875,900,925,950,975,1000]

  merra2:
    collection: inst3_3d_aer_Nv
    variables:
      - DU001
      - DU002
      - DU003
      - DU004
      - DU005
      - SS001
      - SS002
      - SS003
      - SS004
      - SS005
      - SO4
      - BCPHOBIC
      - BCPHILIC
      - OCPHOBIC
      - OCPHILIC
      - AIRDENS
      - RH
      - DELP
